{% extends "base.html" %}

{% block content %}

<div class="text-center mb-4">
<h2>Progress Tracking</h2>
</div>

<div class="row justify-content-center">

<div class="col-md-8">

<!-- ADD WEIGHT CARD -->
<div class="card shadow p-4 mb-4">

<h4 class="mb-3">Add Current Weight</h4>

<form action="/add_progress" method="POST">

<div class="row">

<div class="col-md-8">
<input type="number" step="0.1" name="weight"
class="form-control"
placeholder="Enter weight in kg"
required>
</div>

<div class="col-md-4">
<button class="btn btn-primary w-100">
Save
</button>
</div>

</div>

</form>

</div>


<!-- HISTORY TABLE -->
<div class="card shadow p-4 mb-4">

<h4 class="mb-3">Weight History</h4>

<table class="table table-striped">

<tr>
<th>Date</th>
<th>Weight (kg)</th>
</tr>

{% for record in records %}

<tr>
<td>{{ record[0] }}</td>
<td>{{ record[1] }}</td>
</tr>

{% endfor %}

</table>

</div>


<!-- PROGRESS GRAPH -->
<div class="card shadow p-4">

<h4 class="mb-3">Weight Progress</h4>

<canvas id="progressChart" height="100"></canvas>

</div>

</div>

</div>

<br>

<div class="text-center">
<a href="/" class="btn btn-dark">Back to Home</a>
</div>


<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const records = {{ records | tojson }};

const dates = records.map(r => r[0]);
const weights = records.map(r => r[1]);

const ctx = document.getElementById("progressChart");

new Chart(ctx, {

type: "line",

data: {

labels: dates,

datasets: [{

label: "Weight (kg)",

data: weights,

borderColor: "blue",

backgroundColor: "rgba(0,0,255,0.1)",

tension: 0.3,

fill: true

}]

},

options: {

responsive: true,

plugins: {

legend: {

display: true

}

}

}

});

</script>

{% endblock %}
