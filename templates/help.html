{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow p-4">

<h3 class="text-center mb-3">Help / Contact Admin</h3>

{% with messages = get_flashed_messages() %}

{% if messages %}

<div class="alert alert-success">

{{ messages[0] }}

</div>

{% endif %}

{% endwith %}

<form action="/send_complaint" method="POST">

<div class="mb-3">

<label>Your Message</label>

<textarea name="message"
class="form-control"
rows="4"
placeholder="Write your issue or complaint here..."
required></textarea>

</div>

<button class="btn btn-primary w-100 mb-3">
Send Complaint
</button>

</form>

<!-- BACK BUTTON -->
<a href="/" class="btn btn-dark w-100">
Back to Home
</a>

</div>

</div>

</div>

{% endblock %}
