{% extends "base.html" %}

{% block content %}

<div class="text-center">

<h3 class="mb-3">{{ pose }}</h3>

<!-- SCORE SECTION -->
<div class="mb-3">

<div class="progress" style="height:25px; max-width:400px; margin:auto;">
<div id="scoreBar" class="progress-bar bg-success" role="progressbar" style="width:0%">
</div>
</div>

<h4 class="mt-2">Score: <span id="scoreValue">0</span></h4>

</div>


<!-- CAMERA FEED -->
<div class="card shadow p-3 mb-3" style="max-width:700px; margin:auto;">

<img id="videoFeed"
src="/video/{{ pose }}"
class="img-fluid rounded">

</div>


<!-- TEXT DISPLAY -->
<div class="mb-3">

<h4 id="holdText">Adjust posture</h4>

<button id="repeatBtn" class="btn btn-primary mt-2" style="display:none;">
Repeat
</button>

</div>


<!-- VOICE BUTTON -->
<div style="position:fixed; top:90px; right:30px; z-index:1000;">

<button id="voiceToggle" class="btn btn-warning shadow">
🔊 Voice: ON
</button>

</div>


<a href="/" class="btn btn-dark">
Back to Home
</a>

</div>


<script>

let voiceEnabled = true;
let holdStarted = false;
let goodPoseDetected = false;
let countdown = 10;
let timer = null;
let lastRep = -1;

/* SPEAK FUNCTION */

function speak(text){

    if(!voiceEnabled) return;

    speechSynthesis.cancel();

    const speech = new SpeechSynthesisUtterance(text);
    speech.rate = 1;

    speechSynthesis.speak(speech);

}


/* VOICE TOGGLE */

document.getElementById("voiceToggle").onclick = function(){

    voiceEnabled = !voiceEnabled;

    this.innerText = voiceEnabled ? "🔊 Voice: ON" : "🔇 Voice: OFF";

};


/* START COUNTDOWN (YOGA) */

function startCountdown(){

    holdStarted = true;
    countdown = 10;

    document.getElementById("holdText").innerText = "Hold for 10 seconds";

    speak("Hold for 10 seconds");

    timer = setInterval(function(){

        countdown--;

        document.getElementById("holdText").innerText =
            "Hold: " + countdown;

        speak(countdown.toString());

        if(countdown <= 0){

            clearInterval(timer);

            document.getElementById("holdText").innerText = "Relax";

            speak("Relax");

            document.getElementById("repeatBtn").style.display = "inline-block";

        }

    },1000);

}


/* REPEAT BUTTON */

document.getElementById("repeatBtn").onclick = function(){

    holdStarted = false;
    goodPoseDetected = false;
    countdown = 10;

    this.style.display = "none";

    document.getElementById("holdText").innerText = "Adjust posture";

};


/* SCORE UPDATE */

function updateScore(){

fetch("/score")

.then(res => res.json())

.then(data => {

document.getElementById("scoreValue").innerText = data.score;


/* ---------- EXERCISE MODE ---------- */

if(data.reps !== undefined){

    document.getElementById("repeatBtn").style.display = "none";

    document.getElementById("holdText").innerText =
        "Rep: " + data.reps;

    if(data.reps !== lastRep){

        speak(data.reps.toString());

        lastRep = data.reps;

    }

    return;   // stop yoga logic

}


/* ---------- YOGA MODE ---------- */

/* ADJUST POSTURE */

if(data.score < 80 && !holdStarted){

    document.getElementById("holdText").innerText = "Adjust posture";

}


/* GOOD POSTURE DETECTED */

if(data.score > 80 && !goodPoseDetected){

    goodPoseDetected = true;

    document.getElementById("holdText").innerText = "Good posture";

    speak("Good posture");

    setTimeout(startCountdown,1500);

}


/* SCORE BAR */

let score = data.score;

let bar = document.getElementById("scoreBar");

bar.style.width = score + "%";

if(score > 80){
bar.className = "progress-bar bg-success";
}
else if(score > 50){
bar.className = "progress-bar bg-warning";
}
else{
bar.className = "progress-bar bg-danger";
}

});

}

setInterval(updateScore,500);

</script>
{% endblock %}
