{% extends "base.html" %}

{% block content %}

<div class="text-center">

<h2 class="mb-4 text-capitalize">{{ category }} Poses</h2>

<div class="row justify-content-center">

{% for pose in poses %}

<div class="col-md-3 mb-4">

<div class="card shadow h-100">

<img src="{{ url_for('static', filename='images/' + pose.replace(' ', '_') + '.jpg') }}"
class="card-img-top"
style="height:220px; object-fit:contain; background:#f8f9fa; padding: 10px;">

<div class="card-body">

<h5 class="card-title">{{ pose }}</h5>

<a href="/pose/{{ category }}/{{ pose }}"
class="btn btn-primary w-100">
Start
</a>

</div>

</div>

</div>

{% endfor %}

</div>

<a href="/" class="btn btn-dark mt-3">Back</a>

</div>

{% endblock %}
