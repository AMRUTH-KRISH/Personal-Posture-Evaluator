{% extends "base.html" %}

{% block content %}

<div class="text-center mb-4">
<h2>User Progress</h2>
</div>

<div class="row justify-content-center">

<div class="col-md-7">

<div class="card shadow p-4">

<h4 class="mb-3 text-center">Weight Progress Chart</h4>

<div style="max-width:600px; margin:auto;">
<canvas id="adminChart" height="200"></canvas>
</div>

</div>

</div>

</div>

<br>

<div class="text-center">

<a href="/admin" class="btn btn-dark">
Back to Admin Dashboard
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const records = {{ records | tojson }};

const dates = records.map(r => r[0]);
const weights = records.map(r => r[1]);

const ctx = document.getElementById('adminChart');

new Chart(ctx, {

type: 'line',

data: {

labels: dates,

datasets: [{

label: 'Weight (kg)',

data: weights,

borderColor: 'green',

backgroundColor: 'rgba(0,255,0,0.1)',

tension: 0.3,

fill: true

}]

},

options: {

responsive: true,

maintainAspectRatio: false,

plugins: {

legend: {

display: true

}

}

}

});

</script>

{% endblock %}
