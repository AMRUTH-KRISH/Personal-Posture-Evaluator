<!DOCTYPE html>
<html>
<head>
    <title>AI Fitness Chatbot</title>
    <style>
        body { font-family: Arial; text-align: center; }
        #chatbox {
            width: 60%;
            height: 400px;
            border: 1px solid #ccc;
            margin: auto;
            overflow-y: scroll;
            padding: 10px;
            text-align: left;
        }
        .user { color: blue; }
        .bot { color: green; }
    </style>
</head>
<body>

<h2>🧠 AI Fitness Chatbot</h2>

<div id="chatbox"></div>

<br>

<input type="text" id="userInput" placeholder="Ask about fitness..." style="width: 50%;">
<button onclick="sendMessage()">Send</button>

<br><br>
<a href="/">Back to Home</a>

<script>
function sendMessage() {
    let input = document.getElementById("userInput");
    let message = input.value;

    if (message.trim() === "") return;

    let chatbox = document.getElementById("chatbox");

    chatbox.innerHTML += "<p class='user'><strong>You:</strong> " + message + "</p>";

    fetch("/chat_response", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ message: message })
    })
    .then(response => response.json())
    .then(data => {
        chatbox.innerHTML += "<p class='bot'><strong>Bot:</strong> " + data.reply + "</p>";
        chatbox.scrollTop = chatbox.scrollHeight;
    });

    input.value = "";
}
</script>

</body>
</html>
